<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    .fullscreen-wrapper {
      height: 80vh;
      width: 90vw;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1), 0 0 40px rgba(255, 0, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .split-container {
      display: flex;
      width: 100%;
      max-width: 1300px;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.08);
    }

    .image-panel, .events-panel {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .image-panel p {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      color: #ccc;
    }

    .image-panel img {
      max-width: 100%;
      max-height: 80%;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
      margin-top: 3rem;
    }

    .events-panel > div {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .events-panel h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    #event-grid {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0 auto;
      width: 100%;
      max-width: 400px;
    }

    #event-grid li {
      background: rgba(255, 255, 255, 0.08);
      margin-bottom: 10px;
      padding: 10px 15px;
      border-radius: 8px;
      text-align: center;
    }

    .qr {
      margin-top: -1rem;
    }

    .proceed-button {
      padding: 1rem 2rem;
      border: 2px solid rgba(0, 255, 255, 0.4);
      border-radius: 2rem;
      font-size: 1rem;
      color: white;
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.15), 0 0 20px rgba(255, 0, 255, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      display: inline-block;
      cursor: pointer;
      margin-top: 1rem;
    }

    .proceed-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.4), 0 0 35px rgba(255, 0, 255, 0.3);
      border-color: #ffffff;
    }

    .event-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      max-height: 70vh;
      overflow-y: auto;
      margin-top: 1rem;
      width: 100%;
      max-width: 500px;
    }

    .event-grid.two-columns {
      grid-template-columns: 1fr 1fr;
    }

    .event-grid div {
      background: rgba(255, 255, 255, 0.08);
      padding: 10px 15px;
      border-radius: 8px;
      text-align: center;
    }
    .events-panel {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 90%;
}

.event-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
}

    @media (max-width: 768px) {
      .fullscreen-wrapper {
        height: auto;
        padding: 1rem 0.5rem;
      }

      .split-container {
        flex-direction: column;
        height: auto;
        max-height: none;
        box-shadow: none;
      }

      .image-panel,
      .events-panel {
        width: 100%;
        padding: 1rem 0;
      }

      .image-panel h2,
      .events-panel h2 {
        font-size: 1.1rem;
        margin-bottom: 1rem;
        line-height: 1.4;
      }

      .image-panel img {
        margin-top: 1rem;
        max-height: 250px;
        width: 100%;
        object-fit: contain;
      }

      .event-grid {
        max-height: none;
        max-width: 100%;
        grid-template-columns: 1fr !important;
        padding-bottom: 1rem;
        margin: 0 auto;
      }

      .event-grid.two-columns {
        grid-template-columns: 1fr;
      }

      .event-grid div {
        font-size: 0.9rem;
        word-wrap: break-word;
        overflow-wrap: break-word;
        line-height: 1.3;
        max-width: 90%;
        box-sizing: border-box;
        white-space: normal;
      }

      .proceed-button {
        font-size: 0.85rem;
        padding: 0.6rem 1.3rem;
        width: fit-content;
        margin: 1rem auto 0;
      }
      footer{
        margin-top: 5rem;
      }
    }
  </style>
</head>
<body>

    <main class="content qr">
      <div class="fullscreen-wrapper">
        <div class="split-container">

          <div class="events-panel">

            <div class="event-content">

              <div id="total-amount" style="margin-top: 2rem; font-size: 1.3rem; font-weight: bold; background: linear-gradient(90deg, #00ffff, #ff00ff);
              background-clip: text;

          </div>

  </div>

  <script src="script.js"></script>
  <script>
    const eventPrices = {
      "Bulls & Bears - Mockstock": 500,
      "Nautanki - Mime": 1000,
      "Marketing Event - Big Pitcher": 500,
      "Battle of Words - Debate": 500,
      "Maathu Manthana - Kannada Debate": 500,
      "Chanakya - Elite Executives": 500,
      "Chitratmak - Pictionary": 500,
      "Chucklesome - Mad Ads": 1000,
      "Codex Cronicals": 500,
      "Art Beat - Pencil Sketching": 500,
      "Hog A Thon": 500,
      "BGMI: E sports": 1000,
      "Hum & Hunch - Guess the Song": 500,
      "Danspiration - Group Dance": 2000,
      "STEP UP - Free Style Solo Dance": 500,
      "Poetry Writing": 500,
      "500 Mile - Start Up 500": 500,
      "Gadyapatana Spardha": 500,
      "Bon Appetit - Flameless Cooking": 500,
      "Curio - General Quiz": 500,
      "Bhagavatgita Vaachana Spardha": 500,
      "Matrix Run": 1000,
      "Chitra Spardhe": 500,
      "Treasure Hunt": 500,
      "Thug of War": 500,
      "Best Physique": 500,
      "Vogue Alley - Fashion Show": 2000
    };

    document.addEventListener("DOMContentLoaded", () => {
      const eventGrid = document.getElementById("event-grid");
      const totalAmount = document.getElementById("total-amount");
      const selectedEvents = JSON.parse(localStorage.getItem("selectedEvents")) || [];

      if (selectedEvents.length === 0) {
        eventGrid.innerHTML = "<div>No events selected.</div>";
        totalAmount.innerHTML = "";
      } else {
        if (selectedEvents.length > 6) {
          eventGrid.classList.add("two-columns");
        }

        let total = 0;
        selectedEvents.forEach(event => {
          const div = document.createElement("div");
          const price = eventPrices[event] || 0;
          total += price;
          div.textContent = `${event} - ₹${price}`;
          eventGrid.appendChild(div);
        });

        totalAmount.textContent = `Total: ₹${total}`;
      }
    });

    function goToDetails() {
      window.location.href = "details.html";
    }
  </script>
