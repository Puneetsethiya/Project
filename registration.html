<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAMSKRUTHI - INTERCOLLEGIATE FEST</title>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"></noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="page-wrapper">
    <header>
      <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
      </div>
      
      <nav id="navbar">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="registration.html">Registration</a>
        <a href="about us.html">About Us</a>
        <a href="schedule.html">Schedule</a>
        <a href="contact us.html">Contact Us</a>
      </nav>
    </header>

    <main class="content">
      <div class="about-section">
        <h2>Registration Form</h2>
        <div class="contact-form">
          <form id="registrationForm">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
              <label for="college">College Name</label>
              <input type="text" id="college" name="college" required>
            </div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
              <label for="events">Select Events</label>
              <textarea id="events" name="events" placeholder="List the events you want to participate in..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">Register Now</button>
          </form>
        </div>
      </div>
    </main>

    <div class="footer-credit">
      <p>2025 SAMSKRUTHI | Made with ❤️ by Puneet Sethiya & Adithya K.P (6 BCA)</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
