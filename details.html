    <main class="content fil">
        <h2>Complete your registration</h2>
        <div class="container">
           
            <form id="registrationForm">
              <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" name="name" id="name" required />

  <script src="script.js"></script>
  <script>
    const selectedEvents = JSON.parse(localStorage.getItem("selectedEvents")) || [];
    const eventListUl = document.getElementById("eventList");
    const form = document.getElementById("registrationForm");
  
    // Populate event list
    selectedEvents.forEach(event => {
      const li = document.createElement("li");
      li.textContent = event;
      eventListUl.appendChild(li);
    });
  
    // Track if form has been changed
    let formChanged = false;
  
    // Function to warn user if they try to leave
    function handleBeforeUnload(e) {
      e.preventDefault();
      e.returnValue = "";
    }
  
    // Add listener only when user interacts
    form.addEventListener("input", () => {
      if (!formChanged) {
        window.addEventListener("beforeunload", handleBeforeUnload);
        formChanged = true;
      }
    });
  
    // Submit handler
    form.addEventListener("submit", function (e) {
      e.preventDefault();
  
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const college = document.getElementById("college").value.trim();
      const transactionId = document.getElementById("transactionId").value.trim();
  
      if (!name || !email || !phone || !college || !transactionId) {
        alert("Please fill in all fields.");
        return;
      }
  
      if (!/^\d{10}$/.test(phone)) {
        alert("Phone number must be 10 digits.");
        return;
      }
  
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert("Please enter a valid email address.");
        return;
      }
  
      const formData = new FormData(form);
      formData.append("events", selectedEvents.join(", "));
  
      fetch("https://script.google.com/macros/s/AKfycbxZcl5KTh_kAyJJ3Uv85glSY1t-2KI2PNzu765smQ5G0TU-8SLyAB-HeoxVPRS1qGocVg/exec", {
        method: "POST",
        body: formData
      })
      .then(res => {
        if (res.ok) {
          alert("Registration submitted successfully!");
          localStorage.clear();
          form.reset();
          window.removeEventListener("beforeunload", handleBeforeUnload); 
          window.location.href = "index.html";
        } else {
          alert("Error submitting. Please try again.");
        }
      })
      .catch(err => {
        console.error(err);
        alert("Something went wrong. Please try again.");
      });
    });
  </script>
