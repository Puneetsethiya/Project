    position: relative;
    padding-left: 2.2rem;
    line-height: 1.9;

    top: 0.15rem;
    color: #66ffe0;
    font-size: 1.6rem;
    line-height: 1;

.coordinators-section li::before {

    left: 0;
    top: 0.15rem;
    color: #cc66ff;
    font-size: 1.6rem;
    line-height: 1;
}

    margin-top: 2.5rem;
    letter-spacing: 0.1rem;
